
services:

  microservice-a:
    build:
      context: .
      dockerfile: MicroserviceA/Dockerfile
    container_name: microservice-a
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    networks:
      - microservices-network

  microservice-b:
    build:
      context: .
      dockerfile: MicroserviceB/Dockerfile
    container_name: microservice-b
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    networks:
      - microservices-network

networks:
  microservices-network:
    external: true
