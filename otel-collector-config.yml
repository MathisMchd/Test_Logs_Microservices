receivers:

  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317


processors:

  batch:
    timeout: 5s
    send_batch_size: 1024


  routing:
    from_attribute: service.name
    table:
      - value: app
        processors: [app_attributes]
      - value: microservice
        processors: [micro_attributes]


  app_attributes:
    attributes:
      actions:
        - key: data_stream.type
          value: logs
          action: upsert
        - key: data_stream.dataset
          value: app
          action: upsert
        - key: data_stream.namespace
          value: default
          action: upsert


  micro_attributes:
    attributes:
      actions:
        - key: data_stream.type
          value: logs
          action: upsert
        - key: data_stream.dataset
          value: microservice
          action: upsert
        - key: data_stream.namespace
          value: default
          action: upsert


exporters:

  elasticsearch:
    endpoints: ["http://localhost:9200"]
    logs_index: ""


service:

  pipelines:

    logs:
      receivers: [otlp]
      processors: [routing, batch]
      exporters: [elasticsearch]