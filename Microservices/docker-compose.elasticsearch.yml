version: "3.8"

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9400:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep '\"status\":\"green\"'"]
      interval: 5s
      retries: 12
    networks:
      - microservices-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.4
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false  # Que pour tester 
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - microservices-network



  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.93.0  # version 3.8 correspond approximativement à 0.93.0
    container_name: otel-collector
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    command: ["--config", "/etc/otel-collector-config.yml"]
    ports:
      - "4318:4318"  # HTTP OTLP
      - "4317:4317"  # gRPC OTLP
    depends_on:
      - elasticsearch
    networks:
      - microservices-network
      
networks:
  microservices-network:
    external: true
